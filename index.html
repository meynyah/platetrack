<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlateTrack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/modal.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="screen">

    <main class="main">

        <div class="content">

            <div class="logo">

                <div class="logo-box">
                    🛡️
                </div>

                <h1>PlateTrack</h1>

                <p>ANTIPOLO CITY LGU – LPR SYSTEM</p>

            </div>

            <div class="divider">

                <span>SELECT ACCESS PORTAL</span>

            </div>

            <div class="cards">

                <a href="enforcer-login.html" class="card primary">

                    <div>

                        <h2>Traffic Enforcer Portal</h2>

                        <p>For officers and administrators</p>

                    </div>

                    <span>›</span>

                </a>

                <a href="owner-login.html" class="card">

                    <div>

                        <h2>Vehicle Owner Portal</h2>

                        <p>Check violations and file appeals</p>

                    </div>

                    <span>›</span>

                </a>

            </div>

            <div class="footer">

                © 2026 PlateTrack — Antipolo City LGU

            </div>

        </div>

    </main>

</div>

<!-- GLOBAL MODAL -->

<div id="globalModal" class="modal">

    <div class="modal-box">

        <div
        id="modalIcon"
        class="modal-icon">

            ✅

        </div>

        <div
        id="modalTitle"
        class="modal-title">

            Success

        </div>

        <div
        id="modalMessage"
        class="modal-message">

            Message

        </div>

        <div
        id="modalButtons"
        class="modal-buttons">

        </div>

    </div>

</div>

<script src="js/modal.js"></script>
<script src="js/script.js"></script>

</body>
</html>
