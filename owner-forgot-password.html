<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PlateTrack | Owner - Forgot Password</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/forgot.css">
    <link rel="stylesheet" href="css/modal.css">

</head>

<body>

    <div class="background-grid"></div>

    <main class="login-wrapper">

        <section class="login-card">

            <!-- LOGO AREA -->

            <div class="logo-area">

                <div class="logo-box">
                    <i class="fa-solid fa-car"></i>
                </div>

                <h1>PlateTrack</h1>

                <span class="badge">
                    ANTIPOLO CITY LGU
                </span>

                <p class="portal">
                    Password Recovery
                </p>

            </div>

            <!-- WELCOME TEXT -->

            <div class="welcome">

                <h2>Forgot Password?</h2>

                <p>
                    Enter your registered vehicle owner email address.
                    We will send a 6-digit verification code to confirm your identity.
                </p>

            </div>

            <!-- FORGOT PASSWORD FORM -->

            <form id="ownerForgotPasswordForm" autocomplete="off">

                <div class="input-group">

                    <label for="email">
                        Email Address
                    </label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope input-icon"></i>

                        <input
                            id="email"
                            type="email"
                            maxlength="100"
                            autocomplete="off"
                            placeholder="Enter your email address"
                            required>

                    </div>

                </div>

                <button
                    type="submit"
                    class="primary-btn"
                    id="sendCodeButton">

                    Send Verification Code

                </button>

            </form>

            <!-- BACK LINK -->

            <div class="back-link">

                <a href="owner-login.html">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to Login
                </a>

            </div>

            <!-- FOOTER -->

            <div class="footer">

                <span>
                    <i class="fa-solid fa-lock"></i>
                    Secure Password Recovery
                </span>

                <small>
                    Developed for Antipolo City LGU
                </small>

            </div>

        </section>

    </main>

    <!-- GLOBAL MODAL -->

    <div id="globalModal" class="modal">

        <div class="modal-box">

            <div
                id="modalIcon"
                class="modal-icon">

                <i class="fa-solid fa-circle-check"></i>

            </div>

            <div
                id="modalTitle"
                class="modal-title">

                Success

            </div>

            <div
                id="modalMessage"
                class="modal-message">

                Message

            </div>

            <div
                id="modalButtons"
                class="modal-buttons">

            </div>

        </div>

    </div>

    <script src="js/modal.js"></script>
    <script src="js/owner-forgot-password.js"></script>

</body>

</html>
