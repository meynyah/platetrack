<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PlateTrack | Violation History</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet"
href="css/modal.css">

<link rel="stylesheet"
href="css/history.css">

</head>

<body>

<div class="background-grid"></div>

<div class="history-container">

<!-- ==========================================
TOP BAR
========================================== -->

<header class="topbar">

    <button
    class="back-btn"
    onclick="window.location.href='enforcer-dashboard.html'">

        <i class="fa-solid fa-arrow-left"></i>

    </button>

    <div class="page-title">

        <h2>

            Violation History

        </h2>

        <p>

            View all recorded traffic violations

        </p>

    </div>

    <div class="top-space"></div>

</header>

<!-- ==========================================
SEARCH BAR
========================================== -->

<section class="search-section">

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
        type="text"
        id="searchInput"
        placeholder="Search Plate Number..."
        onkeyup="applyFilters()">

    </div>

</section>

<!-- ==========================================
FILTER
========================================== -->

<section class="filter-section">

    <select
    id="violationFilter"
    onchange="applyFilters()">

        <option value="">

            All Violations

        </option>

        <option value="Illegal Parking">

            Illegal Parking

        </option>

        <option value="Obstruction">

            Obstruction

        </option>

        <option value="No Seatbelt">

            No Seatbelt

        </option>

        <option value="Overspeeding">

            Overspeeding

        </option>

        <option value="Reckless Driving">

            Reckless Driving

        </option>

        <option value="No Loading / Unloading">

            No Loading / Unloading

        </option>

        <option value="Counterflow">

            Counterflow

        </option>

        <option value="Expired Registration">

            Expired Registration

        </option>

        <option value="Driving Without a Valid License">

            Driving Without a Valid License

        </option>

        <option value="Others">

            Others

        </option>

    </select>

</section>

<!-- ==========================================
HISTORY LIST
========================================== -->

<section
id="historyList"
class="history-list">

    <!-- History Cards will appear here -->

</section>

<!-- ==========================================
EMPTY STATE
========================================== -->

<div
id="emptyState"
class="empty-state">

    <div class="empty-icon">

        <i class="fa-solid fa-folder-open"></i>

    </div>

    <h3>

        No Violation Records

    </h3>

    <p>

        Saved traffic violations will appear here.

    </p>

</div>

</div>

<!-- ==========================================
BOTTOM NAVIGATION
========================================== -->

<nav class="bottom-nav">

    <a
    href="enforcer-dashboard.html"
    class="nav-item">

        <i class="fa-solid fa-house"></i>

        <span>Home</span>

    </a>

    <a
    href="camera.html"
    class="nav-item">

        <i class="fa-solid fa-camera"></i>

        <span>Detect</span>

    </a>

    <a
    href="history.html"
    class="nav-item active">

        <i class="fa-solid fa-clock-rotate-left"></i>

        <span>History</span>

    </a>

    <a
    href="profile.html"
    class="nav-item">

        <i class="fa-solid fa-user"></i>

        <span>Profile</span>

    </a>

</nav>

<!-- ==========================================
VIOLATION DETAILS MODAL
========================================== -->

<div
id="detailsModal"
class="details-modal">

    <div class="details-box">

        <div class="details-header">

            <h2>

                <i class="fa-solid fa-file-lines"></i>

                Violation Details

            </h2>

            <button
            class="close-details"
            onclick="closeDetailsModal()">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <div class="details-content">

            <div class="detail-item">

                <span>Record ID</span>

                <strong id="detailRecordId"></strong>

            </div>

            <div class="detail-item">

                <span>Plate Number</span>

                <strong id="detailPlate"></strong>

            </div>

            <div class="detail-item">

                <span>Vehicle</span>

                <strong id="detailVehicle"></strong>

            </div>

            <div class="detail-item">

                <span>Color</span>

                <strong id="detailColor"></strong>

            </div>

            <div class="detail-item">

                <span>Violation</span>

                <strong id="detailViolation"></strong>

            </div>

            <div class="detail-item">

                <span>Location</span>

                <strong id="detailLocation"></strong>

            </div>

            <div class="detail-item">

                <span>Date & Time</span>

                <strong id="detailDate"></strong>

            </div>

            <div class="detail-item">

                <span>Officer Notes</span>

                <strong id="detailNotes"></strong>

            </div>

        </div>

        <div class="details-footer">

            <button
            class="close-modal-btn"
            onclick="closeDetailsModal()">

                Close

            </button>

        </div>

    </div>

</div>

<!-- ==========================================
GLOBAL MODAL
========================================== -->

<div
id="globalModal"
class="modal">

    <div class="modal-box">

        <div
        id="modalIcon"
        class="modal-icon">

            ✅

        </div>

        <div
        id="modalTitle"
        class="modal-title">

            Success

        </div>

        <div
        id="modalMessage"
        class="modal-message">

            Message

        </div>

        <div
        id="modalButtons"
        class="modal-buttons">

        </div>

    </div>

</div>

<script src="js/modal.js"></script>
<script src="js/history.js"></script>

</body>

</html>
