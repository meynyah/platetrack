<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PlateTrack | Forgot Password</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/forgot.css">
    <link rel="stylesheet" href="css/modal.css">

</head>

<body>

    <div class="background-grid"></div>

    <div class="login-wrapper">

        <div class="login-card">

            <div class="logo-area">

                <div class="logo-box">
                    🛡️
                </div>

                <h1>PlateTrack</h1>

                <span class="badge">
                    ANTIPOLO CITY LGU
                </span>

                <p class="portal">
                    Password Recovery
                </p>

            </div>

            <div class="welcome">

                <h2>Forgot Password?</h2>

                <p>
                    Enter the email address associated with your PlateTrack account.
                    We'll send a verification code to verify your identity.
                </p>

            </div>

            <form id="forgotPasswordForm" autocomplete="off">

                <div class="input-group">

                    <label for="email">
                        Email Address
                    </label>

                    <input
                        id="email"
                        type="email"
                        maxlength="100"
                        autocomplete="off"
                        placeholder="officer@platetrack.gov.ph"
                        required>

                </div>

                <button
                    type="button"
                    id="sendCodeBtn"
                    class="login-btn">

                    Send Verification Code

                </button>

            </form>

            <div class="back-link">

                <a href="enforcer-login.html">

                    ← Back to Login

                </a>

            </div>

            <div class="footer">

                <span>
                    🔒 Secure Password Recovery
                </span>

                <small>
                    Developed for Antipolo City LGU
                </small>

            </div>

        </div>

    </div>

    <!-- GLOBAL MODAL -->

    <div id="globalModal" class="modal">

        <div class="modal-box">

            <div
                id="modalIcon"
                class="modal-icon">

                ✅

            </div>

            <div
                id="modalTitle"
                class="modal-title">

                Success

            </div>

            <div
                id="modalMessage"
                class="modal-message">

                Message

            </div>

            <div
                id="modalButtons"
                class="modal-buttons">

            </div>

        </div>

    </div>

    <script src="js/modal.js"></script>
    <script src="js/forgot.js"></script>

</body>

</html>
